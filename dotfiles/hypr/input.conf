####################################################################
# INPUT DEVICES
####################################################################

input {
    kb_layout = us
    numlock_by_default = false
    
    repeat_rate = 25
    repeat_delay = 600
    
    follow_mouse = 1
    mouse_refocus = true
    float_switch_override_focus = 1
    
    sensitivity = 0
    accel_profile = adaptive  # or "flat" for gaming
    natural_scroll = false
    
    left_handed = false
    
}

####################################################################
# PER-DEVICE CONFIG (Find names: hyprctl devices)
####################################################################

 device {
     name = logitech-wireless-mouse
     sensitivity = 0.5
     accel_profile = flat
 }

