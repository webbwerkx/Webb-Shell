####################################################################
# WORKSPACES
####################################################################

# Workspaces are created automatically as needed
# Uncomment sections below to bind workspaces to specific monitors

####################################################################
# DUAL MONITOR WORKSPACE BINDING
####################################################################

# Your vertical stack setup:
# Bottom monitor (DP-1) gets workspaces 1-4
# workspace = 1, monitor:DP-1, default:true
# workspace = 2, monitor:DP-1
# workspace = 3, monitor:DP-1
# workspace = 4, monitor:DP-1

# Top monitor (HDMI-A-1) gets workspaces 5-8
# workspace = 5, monitor:HDMI-A-1, default:true
# workspace = 6, monitor:HDMI-A-1
# workspace = 7, monitor:HDMI-A-1
# workspace = 8, monitor:HDMI-A-1

####################################################################
# SPECIAL WORKSPACES (Scratchpads)
####################################################################

# Accessed with SUPER + S
# workspace = special:magic, gapsout:40

# Auto-open apps in scratchpads:
# workspace = special:term, on-created-empty:kitty
# workspace = special:music, on-created-empty:spotify
# workspace = special:files, on-created-empty:thunar

####################################################################
# WORKSPACE STYLING
####################################################################

# No gaps for gaming (workspace 1):
# workspace = 1, gapsout:0, gapsin:0, rounding:false, border:false

# Keep workspace alive even when empty:
# workspace = 1, persistent:true
# workspace = 2, persistent:true

# Open apps automatically when workspace is created:
# workspace = 2, on-created-empty:firefox
# workspace = 3, on-created-empty:code
