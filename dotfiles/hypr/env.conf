####################################################################
# ENVIRONMENT VARIABLES
####################################################################
# Wayland
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Qt
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# Cursor
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# NVIDIA
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

#env = GBM_BACKEND,nvidia-drm
env = __GL_GSYNC_ALLOWED,0
env = __GL_VRR_ALLOWED,0
env = NVD_BACKEND,direct
env = PROTON_ENABLE_NVAPI,1
env = __GL_SHADER_DISK_CACHE,1
env = __GL_SHADER_DISK_CACHE_SKIP_CLEANUP,1

# Electron apps (VSCode, Discord, Obsidian, etc)
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

# Firefox
env = MOZ_ENABLE_WAYLAND,1
env = MOZ_WEBRENDER,1
####################################################################
# TROUBLESHOOTING (Uncomment only if needed)
####################################################################
# Force Qt to use X11 (if Qt6 apps freeze)
# env = QT_QPA_PLATFORM,xcb
# Force software rendering (if GPU issues)
# env = LIBGL_ALWAYS_SOFTWARE,1
# DPI scaling
# env = QT_AUTO_SCREEN_SCALE_FACTOR,1
# env = QT_SCALE_FACTOR,1
# If GBM_BACKEND causes black screen on some apps, comment it out:
# env = GBM_BACKEND,nvidia-drm
