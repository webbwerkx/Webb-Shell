####################################################################
# MONITORS
####################################################################
# Find monitor names: hyprctl monitors
# Syntax: monitor = NAME, RESOLUTION@REFRESH, POSITION, SCALE

# Auto-detect (single monitor)

monitor = eDP-1, 1920x1080@60, 0x0, 1.25

####################################################################
# DUAL MONITOR EXAMPLES
####################################################################

# Your vertical stack setup (uncomment to use):
# Bottom monitor (primary)
# monitor = DP-1, 1920x1080@60, 0x720, 1

# Top monitor (smaller, scaled)
# monitor = HDMI-A-1, 1920x1080@60, 0x0, 1.5

####################################################################

# Side-by-side setup:
# monitor = DP-1, 1920x1080@144, 0x0, 1
# monitor = HDMI-A-1, 1920x1080@60, 1920x0, 1

# Laptop + external:
#monitor = eDP-1, 1920x1080@60, 0x0, 1
# monitor = HDMI-A-1, 2560x1440@60, 1536x0, 1

# Disable laptop screen:
# monitor = eDP-1, disable

# Enable VRR (G-Sync/FreeSync):
# monitor = DP-1, 2560x1440@144, 0x0, 1, vrr, 1

# Mirror displays:
# monitor = HDMI-A-1, 1920x1080@60, 0x0, 1, mirror, DP-1
